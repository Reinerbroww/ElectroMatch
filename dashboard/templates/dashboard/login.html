<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMatch — Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
        }

        .left-panel img {
            width: 220px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .left-panel h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .left-panel p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }

        .right-panel {
            width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 50px;
        }

        .brand-logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .brand-logo span { color: #0d6efd; }

        .right-panel h3 {
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .right-panel p.subtitle {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-control {
            border: 1.5px solid #e9ecef;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
        }

        .input-group-text {
            background: #f8f9fa;
            border: 1.5px solid #e9ecef;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #6c757d;
        }

        .input-group .form-control {
            border-radius: 0 10px 10px 0;
            border-left: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13,110,253,0.35);
        }

        .footer-text {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.8rem;
            color: #adb5bd;
            text-align: center;
        }

        @media (max-width: 768px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <!-- PANEL KIRI -->
    <div class="left-panel d-none d-md-flex">
        <img src="https://cdn-icons-png.flaticon.com/512/2344/2344011.png" alt="ElectroMatch">
        <h2>Precision Intelligence</h2>
        <p>Experience next-generation hardware matching at electric speeds.</p>
    </div>

    <!-- PANEL KANAN -->
    <div class="right-panel">
        <div class="brand-logo">⚡ Electro<span>Match</span></div>

        <h3>Welcome Back</h3>
        <p class="subtitle">Access your high-performance dashboard.</p>

        {% if error %}
        <div class="alert alert-danger rounded-3 py-2 px-3 mb-3" style="font-size:0.875rem;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold text-dark" style="font-size:0.9rem;">Username</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter your username" autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-dark" style="font-size:0.9rem;">Password</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                Login to Dashboard
            </button>
        </form>

        <p class="footer-text">
            © 2025 ElectroMatch Admin Console.
        </p>
    </div>

</body>
</html>
