<h1>Hasil Rekomendasi</h1>

<table border="1">
    <tr>
        <th>Rank</th>
        <th>Product</th>
        <th>Score</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ r.product.name }}</td>
        <td>{{ r.score }}</td>
    </tr>
    {% endfor %}
</table>
