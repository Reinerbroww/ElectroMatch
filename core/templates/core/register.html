<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Daftar Admin | ElectroMatch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

    <nav class="w-full bg-white border-b border-gray-100">
        <div class="max-w-[1280px] mx-auto px-8 py-4 flex items-center">
            <a href="{% url 'home' %}" class="flex items-center gap-2">
                <svg width="32" height="32" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M45 30H30C24.477 30 20 34.477 20 40V80C20 85.523 24.477 90 30 90H45" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 60H38" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="48" cy="60" r="7" fill="#0052ff"/>
                    <path d="M72 20L48 65H68L60 100L92 50H72L78 20Z" fill="#0052ff"/>
                    <path d="M96 90V40C96 34.477 91.523 30 86 30" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="text-[18px] font-extrabold text-[#191c1e]">Electro<span class="text-[#0052ff]">Match</span></span>
            </a>
        </div>
    </nav>

    <div class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-10 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-50 rounded-full"></div>

            <div class="relative z-10 flex justify-center mb-6">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-[32px] text-[#0052ff]">admin_panel_settings</span>
                </div>
            </div>

            <div class="relative z-10 text-center mb-8">
                <h1 class="text-[24px] font-extrabold text-gray-900">Registrasi Internal</h1>
                <p class="text-[13px] text-gray-500 font-medium mt-1">Portal khusus pendaftaran admin & pekerja</p>
            </div>

            {% if error %}
            <div class="relative z-10 bg-red-50 border border-red-200 text-red-600 text-[13px] font-medium px-4 py-3 rounded-xl mb-5 flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">error</span> {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="relative z-10" autocomplete="off">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Nama Lengkap</label>
                    <input type="text" name="name" required placeholder="Masukkan nama Anda" autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition"/>
                </div>

                <div class="mb-4">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Email Akses</label>
                    <input type="email" name="email" required placeholder="Masukkan email resmi" autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition"/>
                </div>
                
                <div class="mb-4">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Kode Rahasia Perusahaan <span class="text-red-500">*</span></label>
                    <input type="password" name="kode_rahasia" required placeholder="Masukkan kode otorisasi" autocomplete="new-password"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-red-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition"/>
                </div>

                <div class="mb-6">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Kata Sandi Akun</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required placeholder="Buat kata sandi" autocomplete="new-password"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition pr-12"/>
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-[#0052ff] hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-[15px] transition shadow-lg shadow-blue-500/25">
                    Daftar Sebagai Admin
                </button>
            </form>

            <div class="relative z-10 flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <p class="relative z-10 text-center text-[13px] text-gray-500 font-medium mt-2">
                Sudah punya akses? <a href="{% url 'user_login' %}" class="text-[#0052ff] font-bold hover:underline">Masuk sekarang</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>
</html>
