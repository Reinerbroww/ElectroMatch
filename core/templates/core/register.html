<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Daftar | ElectroMatch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

    <!-- NAVBAR -->
    <nav class="w-full bg-white border-b border-gray-100">
        <div class="max-w-[1280px] mx-auto px-8 py-4 flex items-center">
            <a href="{% url 'home' %}" class="flex items-center gap-2">
                <svg width="32" height="32" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M45 30H30C24.477 30 20 34.477 20 40V80C20 85.523 24.477 90 30 90H45" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 60H38" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="48" cy="60" r="7" fill="#0052ff"/>
                    <path d="M72 20L48 65H68L60 100L92 50H72L78 20Z" fill="#0052ff"/>
                    <path d="M96 90V40C96 34.477 91.523 30 86 30" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="text-[18px] font-extrabold text-[#191c1e]">Electro<span class="text-[#0052ff]">Match</span></span>
            </a>
        </div>
    </nav>

    <!-- FORM -->
    <div class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-10 relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-50 rounded-full"></div>

            <!-- ICON -->
            <div class="relative z-10 flex justify-center mb-6">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center">
                    <svg width="32" height="32" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M45 30H30C24.477 30 20 34.477 20 40V80C20 85.523 24.477 90 30 90H45" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M20 60H38" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="48" cy="60" r="7" fill="#0052ff"/>
                        <path d="M72 20L48 65H68L60 100L92 50H72L78 20Z" fill="#0052ff"/>
                        <path d="M96 90V40C96 34.477 91.523 30 86 30" stroke="#0052ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <div class="relative z-10 text-center mb-8">
                <h1 class="text-[24px] font-extrabold text-gray-900">Buat Akun</h1>
                <p class="text-[13px] text-gray-500 font-medium mt-1">Daftar sekarang dan mulai eksplorasi ElectroMatch</p>
            </div>

            <!-- ERROR -->
            {% if error %}
            <div class="relative z-10 bg-red-50 border border-red-200 text-red-600 text-[13px] font-medium px-4 py-3 rounded-xl mb-5 flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">error</span> {{ error }}
            </div>
            {% endif %}

            <!-- SUCCESS -->
            {% if success %}
            <div class="relative z-10 bg-green-50 border border-green-200 text-green-600 text-[13px] font-medium px-4 py-3 rounded-xl mb-5 flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">check_circle</span> {{ success }}
            </div>
            {% endif %}

            <!-- FORM -->
            <form method="POST" class="relative z-10">
                {% csrf_token %}

                <!-- NAMA -->
                <div class="mb-4">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Nama Lengkap</label>
                    <input type="text" name="name" required placeholder="Masukkan nama lengkap"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition"/>
                </div>

                <!-- EMAIL -->
                <div class="mb-4">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Email</label>
                    <input type="email" name="email" required placeholder="Masukkan email"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition"/>
                </div>

                <!-- PASSWORD -->
                <div class="mb-6">
                    <label class="block text-[13px] font-semibold text-gray-700 mb-1.5">Kata Sandi</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required placeholder="Masukkan kata sandi"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] font-medium bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#0052ff] focus:border-transparent transition pr-12"/>
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- SUBMIT -->
                <button type="submit"
                    class="w-full bg-[#0052ff] hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-[15px] transition shadow-lg shadow-blue-500/25">
                    Daftar Sekarang
                </button>
            </form>

            <!-- DIVIDER -->
            <div class="relative z-10 flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-[12px] font-medium text-gray-400">Atau lanjut dengan</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- SOCIAL -->
            <div class="relative z-10 grid grid-cols-2 gap-3">
                <button class="flex items-center justify-center gap-2 px-4 py-3 border border-gray-200 rounded-xl text-[13px] font-semibold text-gray-700 hover:bg-gray-50 transition">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7l-6.6 5.1C9.7 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
                    Google
                </button>
                <button class="flex items-center justify-center gap-2 px-4 py-3 border border-gray-200 rounded-xl text-[13px] font-semibold text-gray-700 hover:bg-gray-50 transition">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#1877F2" d="M48 24C48 10.7 37.3 0 24 0S0 10.7 0 24c0 12 8.8 21.9 20.3 23.7V30.9h-6.1V24h6.1v-5.3c0-6 3.6-9.3 9-9.3 2.6 0 5.4.5 5.4.5v5.9h-3c-3 0-3.9 1.9-3.9 3.8V24h6.6l-1.1 6.9h-5.6v16.8C39.2 45.9 48 36 48 24z"/></svg>
                    Facebook
                </button>
            </div>

            <!-- LOGIN LINK -->
            <p class="relative z-10 text-center text-[13px] text-gray-500 font-medium mt-6">
                Sudah punya akun? <a href="{% url 'home' %}" class="text-[#0052ff] font-bold hover:underline">Masuk sekarang</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>
</html>
