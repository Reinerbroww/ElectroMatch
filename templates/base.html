<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        .navbar-brand { font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; }
        .nav-link-custom {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-link-custom:hover { color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4"
     style="background: #1a1a2e; padding-top: 14px; padding-bottom: 14px;">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="/">⚡ ElectroMatch</a>
        <div class="d-flex gap-4 align-items-center">
            {% with current_url=request.resolver_match.url_name %}
                <a href="/" class="nav-link-custom {% if current_url == 'home' %}text-white{% endif %}">Beranda</a>
                <a href="{% url 'catalog' %}" class="nav-link-custom {% if current_url == 'catalog' %}text-white{% endif %}">Katalog</a>
                <a href="#" class="nav-link-custom {% if current_url == 'about' %}text-white{% endif %}">Tentang Kami</a>
            {% endwith %}
            <a href="/login/" class="btn btn-primary btn-sm px-3"
               style="border-radius: 8px;">Admin Login</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer style="background:#1a1a2e; color:rgba(255,255,255,0.4); text-align:center;
               padding: 20px; font-size:0.82rem;">
    © 2025 ElectroMatch. Precision matching at electric speeds.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
